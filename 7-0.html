<!DOCTYPE html><html lang="zh-CN"><script>const ASSETS=["https://api.wentianplay.com/api/xz202405BDAY.json"];ASSETS.forEach(src=>{fetch(src,{cache:"force-cache"}).then(r=>{if(!r.ok)throw new Error("Failed")}).catch(()=>{const el=src.match(/\.css$/)?"link":"script";if(el==="link"){const l=document.createElement("link");l.rel="stylesheet",l.href=src,document.head.appendChild(l)}else{const s=document.createElement("script");s.src=src,s.async=!1,document.head.appendChild(s)}})})</script><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>生日倒计时 | 2024级5班</title><!--2026年3月3日熬夜赶出来的，这么闲，是来帮我写吗？去玩你的游戏去。--><style> *{margin:0;padding:0;box-sizing:border-box}

    </style></head><body><div class="container"><div class="header"><h1>🎂 生日倒计时 · 2024级5班</h1><!--都说了，数据不在本地，你看啥？--><div id="currentTime"></div><button class="theme-switch" id="themeSwitch">🌙 夜间模式</button></div><div class="countdown-container"><div class="countdown-card"><h2>⏳ 最近生日 · 倒计时</h2><div id="topCountdowns"></div></div></div><div class="main-content"><div class="card"><h2>👥 学生列表 · 生肖祝福</h2><div class="search-box"><input type="text" id="searchInput" placeholder="输入姓名搜索..."></div><div class="students-list" id="studentsList"><div style="text-align:center;padding:20px;color:#666">加载中...</div></div></div><!--你这都看不懂，学啥计算机--><div class="card"><h2>🔐 信息验证</h2><div class="verification-box"><div class="input-group"><input type="text" id="studentName" placeholder="点击左侧选择学生" readonly><input type="text" id="idLastFour" placeholder="验证码后4位" maxlength="4"></div><button class="verify-btn" id="verifyBtn">验证身份</button><div class="error" id="errorMsg"></div></div><div class="result-box" id="resultBox"><div class="result-item"><div class="result-label">姓名</div><div class="result-value" id="resultName">-</div></div><div class="result-item"><div class="result-label">身份证号</div><div class="result-value" id="resultId">-</div></div><div class="result-item"><div class="result-label">性别</div><div class="result-value" id="resultGender">-</div></div><div class="result-item"><div class="result-label">家庭住址</div><div class="result-value" id="resultAddress">-</div></div></div></div></div></div><!--都看到这里了，只要你不是2025级计算机班精神黑客就行，其他都好说。人家瞪一眼鼠标键盘不动就说把全世界系统都黑了，哈哈哈--><script>(function(){let students=[];let selectedStudent=null;let isDarkMode=false;function updateTime(){const now=new Date();const beijingTime=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Shanghai'}));const dateStr=beijingTime.toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'long'});const timeStr=beijingTime.toLocaleTimeString('zh-CN',{hour12:false});document.getElementById('currentTime').innerHTML=`📅 ${dateStr} 🕐 ${timeStr}`;}function formatId(id){return id?`${id.substring(0,6)}********${id.substring(14)}`:'-';}function getBirthday(id){if(!id||id.length<14)return '2000-01-01';return `${id.substring(6,10)}-${id.substring(10,12)}-${id.substring(12,14)}`;}function getCountdown(birthStr){const now=new Date();const beijingNow=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Shanghai'}));const today=new Date(beijingNow.getFullYear(),beijingNow.getMonth(),beijingNow.getDate());const birth=new Date(birthStr);birth.setFullYear(beijingNow.getFullYear());if(birth<today)birth.setFullYear(beijingNow.getFullYear()+1);const diffMs=birth-beijingNow;const days=Math.floor(diffMs/(1000*60*60*24));const hours=Math.floor((diffMs%(1000*60*60*24))/(1000*60*60));const minutes=Math.floor((diffMs%(1000*60*60))/(1000*60));const seconds=Math.floor((diffMs%(1000*60))/1000);return{days,hours,minutes,seconds,totalMs:diffMs};}function getZodiac(year){const zodiacs=['猴','鸡','狗','猪','鼠','牛','虎','兔','龙','蛇','马','羊'];return zodiacs[year%12]||'?';}function getBlessingByZodiac(zodiac){const map={'鼠':'机敏灵巧，岁月丰盈','牛':'勤勉踏实，厚德载物','虎':'虎虎生威，前程似锦','兔':'温柔聪慧，步步登高','龙':'神龙昂首，万事顺遂','蛇':'睿智从容，福泽绵长','马':'自由奔放，马到成功','羊':'温良和乐，三阳开泰','猴':'机智敏捷，心想事成','鸡':'金鸡报晓，朝气蓬勃','狗':'忠诚守护，平安喜乐','猪':'敦厚淳朴，诸事圆满'};return map[zodiac]||'生日快乐，万事如意';}function renderStudents(filter=''){const container=document.getElementById('studentsList');if(!students.length){container.innerHTML='<div style="text-align:center;padding:20px;color:#666">数据加载中...</div>';return;}const filtered=students.filter(s=>s.name.includes(filter)||s.idNumber.includes(filter));if(!filtered.length){container.innerHTML='<div style="text-align:center;padding:20px;color:#666">未找到匹配的学生</div>';return;}container.innerHTML='';filtered.forEach(s=>{const div=document.createElement('div');div.className='student-item'+(selectedStudent&&selectedStudent.id===s.id?' active':'');const birth=getBirthday(s.idNumber);const year=parseInt(birth.substring(0,4));const zodiac=getZodiac(year);const blessing=getBlessingByZodiac(zodiac);div.innerHTML=`<div class="student-name">${s.name} (${s.gender}) <span class="bless-badge">${zodiac}</span></div><div class="student-info">生日:${birth} | 🎁 ${blessing}</div>`;div.onclick=()=>{document.querySelectorAll('.student-item').forEach(e=>e.classList.remove('active'));div.classList.add('active');selectedStudent=s;document.getElementById('studentName').value=s.name;document.getElementById('idLastFour').value='';document.getElementById('resultBox').classList.remove('active');document.getElementById('errorMsg').classList.remove('active');};container.appendChild(div);});}function updateAllCountdowns(){const now=new Date();const beijingNow=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Shanghai'}));if(!students.length)return;let nearest=students.map(s=>{const birth=getBirthday(s.idNumber);const cd=getCountdown(birth);const birthYear=parseInt(birth.substring(0,4));const age=beijingNow.getFullYear()-birthYear;return{...s,birth,cd,age};}).sort((a,b)=>a.cd.totalMs-b.cd.totalMs).slice(0,10);const container=document.getElementById('topCountdowns');if(!container)return;if(!nearest.length){container.innerHTML='<div style="text-align:center;padding:20px;color:#666">暂无生日数据</div>';return;}container.innerHTML='';nearest.forEach(s=>{const div=document.createElement('div');div.className='countdown-item';const year=parseInt(s.birth.substring(0,4));const zodiac=getZodiac(year);const blessing=getBlessingByZodiac(zodiac);const cdNow=getCountdown(s.birth);div.innerHTML=`<div class="countdown-header"><div class="countdown-name">${s.name} (${s.gender}) · ${zodiac}</div><div class="countdown-time">${cdNow.days}天${cdNow.hours}时${cdNow.minutes}分${cdNow.seconds}秒</div></div><div class="countdown-info"><div>🎂 ${s.birth} (${s.age}岁)</div><div class="bless-tag">✨ ${blessing}</div></div>`;container.appendChild(div);});}async function loadData(){try{const res=await fetch('https://api.wentianplay.com/api/xz202405BDAY.json');students=await res.json();renderStudents();updateAllCountdowns();setInterval(updateAllCountdowns,1000);}catch(e){console.error('加载失败:',e);document.getElementById('studentsList').innerHTML='<div style="text-align:center;padding:20px;color:#e74c3c">数据加载失败，请检查网络</div>';}}function verify(){const err=document.getElementById('errorMsg');err.classList.remove('active');if(!selectedStudent){err.textContent='请先选择同志';err.classList.add('active');return;}const input=document.getElementById('idLastFour').value.trim();if(!input||input.length!==4){err.textContent='身份证后四位错误';err.classList.add('active');return;}if(input!==selectedStudent.idNumber.slice(-4)){err.textContent='身份证后四位错误';err.classList.add('active');return;}document.getElementById('resultName').textContent=selectedStudent.name;document.getElementById('resultId').textContent=formatId(selectedStudent.idNumber);document.getElementById('resultGender').textContent=selectedStudent.gender;document.getElementById('resultAddress').textContent=selectedStudent.address;document.getElementById('resultBox').classList.add('active');}function toggleTheme(){isDarkMode=!isDarkMode;document.body.classList.toggle('dark-mode',isDarkMode);document.getElementById('themeSwitch').textContent=isDarkMode?'☀️ 日间模式':'🌙 夜间模式';localStorage.setItem('theme',isDarkMode?'dark':'light');}document.addEventListener('DOMContentLoaded',()=>{isDarkMode=localStorage.getItem('theme')==='dark';document.body.classList.toggle('dark-mode',isDarkMode);document.getElementById('themeSwitch').textContent=isDarkMode?'☀️ 日间模式':'🌙 夜间模式';updateTime();setInterval(updateTime,1000);loadData();document.getElementById('searchInput').oninput=(e)=>renderStudents(e.target.value);document.getElementById('verifyBtn').onclick=verify;document.getElementById('idLastFour').onkeypress=(e)=>e.key==='Enter'&&verify();document.getElementById('themeSwitch').onclick=toggleTheme;});})();</script></body></html>
